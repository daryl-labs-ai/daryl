[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "dsm-mcp"
version = "0.1.1"
description = "DSM Memory MCP Server — provable, append-only memory for AI agents via MCP"
readme = "README.md"
requires-python = ">=3.10"
license = "MIT"
dependencies = [
    "daryl-dsm>=0.9.0",
    "mcp>=1.25.0",
]

[project.scripts]
dsm-mcp = "dsm.integrations.goose:main"
dsm-serve-goose = "dsm.integrations.goose:main"
