name: Lint - forbid direct Storage access

on:
  pull_request:
  push:
    branches: [main]

jobs:
  forbid-storage-access:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run forbid_storage_access lint
        run: python scripts/forbid_storage_access.py
