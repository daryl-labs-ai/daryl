name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload distributions to PyPI after build and dependency checks pass"
        required: true
        default: false
        type: boolean

jobs:
  publish-daryl-dsm:
    name: Publish daryl-dsm
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build
        run: python -m build

      - name: Check daryl-dsm runtime dependencies resolve from PyPI
        run: |
          python -m venv /tmp/daryl-dsm-install-check
          /tmp/daryl-dsm-install-check/bin/python -m pip install --upgrade pip
          /tmp/daryl-dsm-install-check/bin/python -m pip install dist/daryl_dsm-*.whl
          /tmp/daryl-dsm-install-check/bin/python -c "import dsm; import dsm_primitives"

      - name: Publish to PyPI
        if: ${{ inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  publish-dsm-mcp:
    name: Publish dsm-mcp
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    needs: publish-daryl-dsm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build dsm-mcp
        working-directory: packages/dsm-mcp
        run: python -m build

      - name: Publish dsm-mcp to PyPI
        if: ${{ inputs.publish }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/dsm-mcp/dist/
          skip-existing: true
