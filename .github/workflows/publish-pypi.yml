name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  publish-daryl-dsm:
    name: Publish daryl-dsm
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-dsm-mcp:
    name: Publish dsm-mcp
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    needs: publish-daryl-dsm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install build

      - name: Build dsm-mcp
        working-directory: packages/dsm-mcp
        run: python -m build

      - name: Publish dsm-mcp to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/dsm-mcp/dist/
