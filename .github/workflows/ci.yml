name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml', 'packages/*/pyproject.toml', 'agent-mesh/pyproject.toml') }}

      - name: Install monorepo dev environment
        run: bash scripts/setup_dev_env.sh

      - name: Show environment
        run: |
          python --version
          pip list

      - name: Lint with ruff
        run: ruff check src/ tests/

      - name: Security check with bandit
        run: bandit -r src/ -ll

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short --cov=src/dsm --cov-report=term-missing --cov-report=html

      - name: Run agent-mesh tests
        run: python -m pytest agent-mesh/tests/ -v --tb=short

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
